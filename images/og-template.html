<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>og-template</title>
<style>
  @font-face {
    font-family: 'Montserrat';
    src: url('../fonts/montserrat-variable.woff2') format('woff2');
    font-weight: 100 900;
    font-display: block;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #0B0B0B;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Montserrat', -apple-system, Segoe UI, Roboto, sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
  }
  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
  }
  .wordmark {
    position: absolute;
    top: 130px;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
    height: auto;
    display: block;
  }
  .brand {
    position: absolute;
    top: 425px;
    left: 0;
    width: 1200px;
    text-align: center;
    font-weight: 700;
    font-size: 50px;
    letter-spacing: 0.5px;
    color: #FFFFFF;
  }
  .tagline {
    position: absolute;
    top: 495px;
    left: 0;
    width: 1200px;
    text-align: center;
    font-weight: 400;
    font-size: 28px;
    color: #B0B0B0;
    letter-spacing: 0.2px;
  }
  .url {
    position: absolute;
    bottom: 30px;
    right: 56px;
    font-weight: 600;
    font-size: 22px;
    color: #6E6E6E;
    letter-spacing: 1px;
  }
  .accent {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1200px;
    height: 10px;
    background: #F54C03;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="wordmark" src="logo-hires.png" alt="twRty">
    <div class="brand">twRty Software Services</div>
    <div class="tagline">Inventive software that brings your ideas to life</div>
    <div class="url">twrty.org</div>
    <div class="accent"></div>
  </div>
</body>
</html>
